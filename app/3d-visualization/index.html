<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Intelligence Platform — 3D Asteroid Tracker</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #fff; }
      canvas { display: block; }

      #ui {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        pointer-events: none;
      }
      #ui h1 { font-size: 18px; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; }
      #ui p { font-size: 12px; color: #aaa; margin-top: 4px; }

      #legend {
        position: absolute;
        bottom: 20px;
        left: 20px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .legend-item { display: flex; align-items: center; gap: 10px; font-size: 12px; }
      .dot { width: 12px; height: 12px; border-radius: 50%; }

      #stats {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        text-align: right;
        font-size: 13px;
        line-height: 1.8;
      }
      #stats span { color: #00d4ff; }

      #tooltip {
        position: absolute;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid #00d4ff;
        padding: 10px 14px;
        border-radius: 6px;
        font-size: 12px;
        pointer-events: none;
        display: none;
        z-index: 20;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <h1>☄️ Asteroid Tracker</h1>
      <p>Live 3D close-approach visualization</p>
    </div>

    <div id="stats">
      Asteroids: <span id="count">—</span><br />
      Hazardous: <span id="hazardous" style="color:#ff4444">—</span><br />
      Safe: <span id="safe" style="color:#44ff88">—</span>
    </div>

    <div id="legend">
      <div class="legend-item"><div class="dot" style="background:#ff4444"></div> Hazardous (dist &lt; 0.05 AU, H &lt; 22)</div>
      <div class="legend-item"><div class="dot" style="background:#ffaa00"></div> Near (dist &lt; 0.1 AU)</div>
      <div class="legend-item"><div class="dot" style="background:#44ff88"></div> Safe</div>
      <div class="legend-item"><div class="dot" style="background:#00d4ff"></div> Earth</div>
    </div>

    <div id="tooltip"></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from 'three';
      import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

      // ─── Scene Setup ────────────────────────────────────────────────────────────
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.01, 1000);
      camera.position.set(0, 4, 8);

      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(devicePixelRatio);
      renderer.setSize(innerWidth, innerHeight);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      document.body.appendChild(renderer.domElement);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.minDistance = 1.5;
      controls.maxDistance = 30;

      // ─── Stars ───────────────────────────────────────────────────────────────────
      const starGeo = new THREE.BufferGeometry();
      const starCount = 8000;
      const starPositions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount * 3; i++) {
        starPositions[i] = (Math.random() - 0.5) * 400;
      }
      starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
      scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 })));

      // ─── Earth ────────────────────────────────────────────────────────────────────
      const earthGeo = new THREE.SphereGeometry(1, 64, 64);
      const textureLoader = new THREE.TextureLoader();

      // Fallback solid earth if textures unavailable
      const earthMat = new THREE.MeshPhongMaterial({ color: 0x2266cc, shininess: 80 });
      const earth = new THREE.Mesh(earthGeo, earthMat);
      scene.add(earth);

      // Atmosphere glow
      const atmGeo = new THREE.SphereGeometry(1.05, 64, 64);
      const atmMat = new THREE.MeshPhongMaterial({
        color: 0x4488ff,
        transparent: true,
        opacity: 0.12,
        side: THREE.FrontSide,
      });
      scene.add(new THREE.Mesh(atmGeo, atmMat));

      // ─── Orbit Ring ──────────────────────────────────────────────────────────────
      const ringGeo = new THREE.RingGeometry(2.9, 3.0, 128);
      const ringMat = new THREE.MeshBasicMaterial({ color: 0x334455, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      scene.add(ring);

      // ─── Lighting ────────────────────────────────────────────────────────────────
      scene.add(new THREE.AmbientLight(0x223366, 0.6));
      const sunLight = new THREE.DirectionalLight(0xffffff, 1.4);
      sunLight.position.set(10, 5, 8);
      scene.add(sunLight);

      // ─── Asteroid Data ───────────────────────────────────────────────────────────
      const NASA_API = 'https://ssd-api.jpl.nasa.gov/cad.api?date-min=2020-01-01&date-max=2024-01-01&dist-max=0.2&fullname=true';

      let asteroidMeshes = [];
      const tooltip = document.getElementById('tooltip');

      async function loadAsteroids() {
        try {
          const res = await fetch(NASA_API);
          const json = await res.json();
          const fields = json.fields;
          const rows = json.data;

          const fi = (name) => fields.indexOf(name);
          const iDist = fi('dist'), iVrel = fi('v_rel'), iH = fi('h'), iDes = fi('des');

          // Sample up to 600 for performance
          const sample = rows.sort(() => Math.random() - 0.5).slice(0, 600);

          let hazCount = 0, safeCount = 0;

          sample.forEach((row) => {
            const dist = parseFloat(row[iDist]);
            const vrel = parseFloat(row[iVrel]);
            const h = parseFloat(row[iH]);
            const name = row[iDes] ?? 'Unknown';

            if (isNaN(dist) || isNaN(h)) return;

            const isHazardous = dist < 0.05 && h < 22;
            const isNear = dist < 0.1;

            isHazardous ? hazCount++ : safeCount++;

            // Map dist (AU) → scene radius. 0 AU = 1 (earth surface), 0.2 AU = 6
            const r = 1 + (dist / 0.2) * 5;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);

            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta) * 0.3; // flatten a bit
            const z = r * Math.cos(phi);

            const size = isHazardous ? 0.06 : isNear ? 0.045 : 0.03;
            const color = isHazardous ? 0xff4444 : isNear ? 0xffaa00 : 0x44ff88;

            const geo = new THREE.SphereGeometry(size, 8, 8);
            const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.userData = { name, dist, vrel, h, isHazardous, angle: theta, radius: r, speed: 0.001 + Math.random() * 0.003 };
            scene.add(mesh);
            asteroidMeshes.push(mesh);
          });

          document.getElementById('count').textContent = asteroidMeshes.length;
          document.getElementById('hazardous').textContent = hazCount;
          document.getElementById('safe').textContent = safeCount;
        } catch (e) {
          console.warn('API unavailable, using demo data:', e.message);
          spawnDemoAsteroids();
        }
      }

      function spawnDemoAsteroids() {
        for (let i = 0; i < 300; i++) {
          const dist = Math.random() * 0.2;
          const h = 15 + Math.random() * 15;
          const isHazardous = dist < 0.05 && h < 22;
          const isNear = dist < 0.1;
          const r = 1 + (dist / 0.2) * 5;
          const theta = Math.random() * Math.PI * 2;
          const phi = Math.acos(2 * Math.random() - 1);
          const x = r * Math.sin(phi) * Math.cos(theta);
          const y = r * Math.sin(phi) * Math.sin(theta) * 0.3;
          const z = r * Math.cos(phi);
          const color = isHazardous ? 0xff4444 : isNear ? 0xffaa00 : 0x44ff88;
          const geo = new THREE.SphereGeometry(isHazardous ? 0.06 : 0.03, 8, 8);
          const mat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 0.4 });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.position.set(x, y, z);
          mesh.userData = { name: `Asteroid-${i}`, dist, h, isHazardous, angle: theta, radius: r, speed: 0.001 + Math.random() * 0.003 };
          scene.add(mesh);
          asteroidMeshes.push(mesh);
        }
        document.getElementById('count').textContent = 300;
        document.getElementById('hazardous').textContent = asteroidMeshes.filter(m => m.userData.isHazardous).length;
        document.getElementById('safe').textContent = asteroidMeshes.filter(m => !m.userData.isHazardous).length;
      }

      loadAsteroids();

      // ─── Raycaster for hover ──────────────────────────────────────────────────────
      const raycaster = new THREE.Raycaster();
      raycaster.params.Points.threshold = 0.1;
      const mouse = new THREE.Vector2();

      renderer.domElement.addEventListener('mousemove', (e) => {
        mouse.x = (e.clientX / innerWidth) * 2 - 1;
        mouse.y = -(e.clientY / innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(asteroidMeshes);

        if (hits.length > 0) {
          const { name, dist, vrel, h, isHazardous } = hits[0].object.userData;
          tooltip.style.display = 'block';
          tooltip.style.left = e.clientX + 14 + 'px';
          tooltip.style.top = e.clientY + 14 + 'px';
          tooltip.innerHTML = `
            <strong>${name}</strong><br/>
            Dist: ${dist?.toFixed(4)} AU<br/>
            Vel: ${vrel?.toFixed(2)} km/s<br/>
            H: ${h?.toFixed(1)}<br/>
            <span style="color:${isHazardous ? '#ff4444' : '#44ff88'}">${isHazardous ? '⚠ HAZARDOUS' : '✓ SAFE'}</span>
          `;
        } else {
          tooltip.style.display = 'none';
        }
      });

      // ─── Animation Loop ──────────────────────────────────────────────────────────
      const clock = new THREE.Clock();

      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();

        earth.rotation.y = t * 0.1;

        asteroidMeshes.forEach((m) => {
          m.userData.angle += m.userData.speed;
          const a = m.userData.angle;
          const r = m.userData.radius;
          m.position.x = r * Math.cos(a);
          m.position.z = r * Math.sin(a);
        });

        controls.update();
        renderer.render(scene, camera);
      }

      animate();

      window.addEventListener('resize', () => {
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(innerWidth, innerHeight);
      });
    </script>
  </body>
</html>
