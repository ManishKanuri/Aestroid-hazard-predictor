<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Intelligence Platform — 3D Tracker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; color: #e0e0e0; }

    #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    #ui h1 { font-size: 18px; color: #00d4ff; letter-spacing: 2px; text-transform: uppercase; }
    #ui p  { font-size: 11px; color: #888; margin-top: 3px; }

    #mode-bar {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      z-index: 20; display: flex; gap: 0;
    }
    .mode-btn {
      padding: 8px 28px; font-family: 'Courier New', monospace; font-size: 13px;
      cursor: pointer; border: 1px solid #334; background: #0a0a1a; color: #888;
      transition: all .2s;
    }
    .mode-btn:first-child { border-radius: 6px 0 0 6px; }
    .mode-btn:last-child  { border-radius: 0 6px 6px 0; }
    .mode-btn.active { background: #00d4ff; color: #000; border-color: #00d4ff; font-weight: bold; }

    #stats {
      position: absolute; top: 70px; right: 20px; z-index: 10;
      font-size: 12px; line-height: 2; text-align: right;
    }
    #stats .val { color: #00d4ff; }
    #stats .haz { color: #ff4444; }
    #stats .safe { color: #44ff88; }

    #legend {
      position: absolute; bottom: 24px; left: 20px; z-index: 10;
      display: flex; flex-direction: column; gap: 7px; font-size: 12px;
    }
    .leg { display: flex; align-items: center; gap: 9px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    #tooltip {
      position: absolute; background: rgba(5,5,20,.9); border: 1px solid #00d4ff;
      padding: 10px 14px; border-radius: 6px; font-size: 12px; line-height: 1.9;
      pointer-events: none; display: none; z-index: 30;
    }

    #loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      z-index: 50; text-align: center; color: #00d4ff; font-size: 14px;
    }
    #loading .spinner {
      width: 40px; height: 40px; border: 3px solid #334;
      border-top-color: #00d4ff; border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div>Loading live data…</div>

<div id="ui">
  <h1>☄️ Space Intelligence</h1>
  <p id="data-src">Connecting to NASA & CelesTrak…</p>
</div>

<div id="mode-bar">
  <button class="mode-btn active" id="btn-sat" onclick="setMode('sat')">🛰 SATELLITES</button>
  <button class="mode-btn"        id="btn-ast" onclick="setMode('ast')">☄️ ASTEROIDS</button>
</div>

<div id="stats">
  <span id="stat-label">Satellites</span>: <span class="val" id="stat-total">—</span><br>
  <span id="stat-a-label">LEO</span>: <span class="safe" id="stat-leo">—</span> &nbsp;
  <span id="stat-b-label">MEO</span>: <span class="val"  id="stat-meo">—</span> &nbsp;
  <span id="stat-c-label">GEO+</span>: <span class="haz" id="stat-geo">—</span>
</div>

<div id="legend" id="leg-sat">
  <div class="leg"><div class="dot" style="background:#44ff88"></div> LEO (&lt;2 000 km)</div>
  <div class="leg"><div class="dot" style="background:#ffaa00"></div> MEO (2 000–35 786 km)</div>
  <div class="leg"><div class="dot" style="background:#ff4444"></div> GEO / HEO (&gt;35 786 km)</div>
  <div class="leg"><div class="dot" style="background:#00d4ff"></div> Earth</div>
</div>

<div id="tooltip"></div>

<!-- satellite.js UMD must load before the ES module -->
<script src="https://cdn.jsdelivr.net/npm/satellite.js@4.1.3/dist/satellite.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Renderer / Scene ──────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(devicePixelRatio);
renderer.setSize(innerWidth, innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.01, 1000);
camera.position.set(0, 3, 7);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance  = 1.4;
controls.maxDistance  = 50;

// ── Stars ─────────────────────────────────────────────────────────────────────
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(10000 * 3);
for (let i = 0; i < starPos.length; i++) starPos[i] = (Math.random() - .5) * 600;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: .12 })));

// ── Earth ─────────────────────────────────────────────────────────────────────
const earthMat = new THREE.MeshPhongMaterial({ color: 0x1a3a6a, emissive: 0x0a1a3a, shininess: 60 });
const earth    = new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), earthMat);
scene.add(earth);

// Continents overlay (simple grid lines)
const wireGeo = new THREE.SphereGeometry(1.001, 24, 16);
scene.add(new THREE.Mesh(wireGeo, new THREE.MeshBasicMaterial({
  color: 0x224488, wireframe: true, transparent: true, opacity: 0.12
})));

// Atmosphere
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(1.06, 64, 64),
  new THREE.MeshPhongMaterial({ color: 0x3366ff, transparent: true, opacity: 0.08, side: THREE.FrontSide })
));

// ── Lighting ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x223366, 0.7));
const sun = new THREE.DirectionalLight(0xffeedd, 1.6);
sun.position.set(12, 5, 8);
scene.add(sun);

// ── Utilities ────────────────────────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

function hideLoader() { document.getElementById('loading').style.display = 'none'; }

function altColor(altKm) {
  if (altKm < 2000)  return 0x44ff88;   // LEO  – green
  if (altKm < 35786) return 0xffaa00;   // MEO  – orange
  return 0xff4444;                       // GEO+ – red
}

function mkSphere(r, color, emissiveInt = 0.5) {
  return new THREE.Mesh(
    new THREE.SphereGeometry(r, 8, 8),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: emissiveInt })
  );
}

// ── Groups ────────────────────────────────────────────────────────────────────
const satGroup = new THREE.Group();
const astGroup = new THREE.Group();
scene.add(satGroup, astGroup);

let satMeshes = [];
let astMeshes = [];
let satRecords = [];   // { name, satrec }
let trailLines = [];

const EARTH_R_KM = 6371;

// ══════════════════════════════════════════════════════════════════════════════
// SATELLITE MODE
// ══════════════════════════════════════════════════════════════════════════════

function parseTLE(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  const out = [];
  for (let i = 0; i + 2 < lines.length; i += 3) {
    const name = lines[i].replace(/\s+$/, '');
    const l1 = lines[i + 1], l2 = lines[i + 2];
    if (l1[0] === '1' && l2[0] === '2') {
      try { out.push({ name, satrec: satellite.twoline2satrec(l1, l2) }); } catch (_) {}
    }
  }
  return out;
}

function eciToThree(posKm) {
  // ECI → Three.js: x=x, y=z(north), z=-y
  return new THREE.Vector3(
    posKm.x / EARTH_R_KM,
    posKm.z / EARTH_R_KM,
   -posKm.y / EARTH_R_KM
  );
}

function buildSatMeshes() {
  satGroup.clear();
  satMeshes = [];
  trailLines = [];

  satRecords.forEach(({ name, satrec }) => {
    const pv = satellite.propagate(satrec, new Date());
    if (!pv?.position || typeof pv.position === 'boolean') return;

    const pos = eciToThree(pv.position);
    const altKm = (pos.length() - 1) * EARTH_R_KM;
    const color = altColor(altKm);

    const mesh = mkSphere(0.025, color);
    mesh.position.copy(pos);
    mesh.userData = { name, satrec, altKm, trail: [], color };
    satGroup.add(mesh);
    satMeshes.push(mesh);

    // Trail line (starts empty)
    const trailGeo = new THREE.BufferGeometry();
    const trailMat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.35 });
    const line = new THREE.Line(trailGeo, trailMat);
    satGroup.add(line);
    trailLines.push(line);
  });

  updateSatStats();
}

function updateSatPositions() {
  const now = new Date();
  satMeshes.forEach((mesh, i) => {
    const pv = satellite.propagate(mesh.userData.satrec, now);
    if (!pv?.position || typeof pv.position === 'boolean') return;

    const pos = eciToThree(pv.position);
    mesh.position.copy(pos);

    // Trail
    const trail = mesh.userData.trail;
    trail.push(pos.clone());
    if (trail.length > 60) trail.shift();

    const pts = trail.flatMap(p => [p.x, p.y, p.z]);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(pts), 3));
    trailLines[i].geometry.dispose();
    trailLines[i].geometry = geo;
  });
}

function updateSatStats() {
  document.getElementById('stat-a-label').textContent = 'LEO';
  document.getElementById('stat-b-label').textContent = 'MEO';
  document.getElementById('stat-c-label').textContent = 'GEO+';
  const leo = satMeshes.filter(m => m.userData.altKm < 2000).length;
  const meo = satMeshes.filter(m => m.userData.altKm >= 2000 && m.userData.altKm < 35786).length;
  const geo = satMeshes.filter(m => m.userData.altKm >= 35786).length;
  document.getElementById('stat-label').textContent = 'Satellites';
  document.getElementById('stat-total').textContent = satMeshes.length;
  document.getElementById('stat-leo').textContent = leo;
  document.getElementById('stat-meo').textContent = meo;
  document.getElementById('stat-geo').textContent = geo;
}

async function loadSatellites() {
  const urls = [
    'https://celestrak.org/pub/TLE/stations.txt',
    'https://celestrak.org/pub/TLE/visual.txt',
    'https://celestrak.org/pub/TLE/starlink.txt',
    'https://celestrak.org/pub/TLE/active.txt',
  ];
  satRecords = [];
  for (const url of urls) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const text = await res.text();
      if (!text.trim().startsWith('0') && !text.trim().match(/^[A-Z0-9 -]/)) continue;
      satRecords.push(...parseTLE(text));
    } catch (e) {
      console.warn('CelesTrak fetch failed:', url, e.message);
    }
    if (satRecords.length >= 500) break;
  }
  // Deduplicate by name
  const seen = new Set();
  satRecords = satRecords.filter(r => {
    if (seen.has(r.name)) return false;
    seen.add(r.name);
    return true;
  }).slice(0, 500);

  if (satRecords.length === 0) {
    console.warn('Using demo satellites');
    satRecords = buildDemoSatellites();
  }

  document.getElementById('data-src').textContent =
    `CelesTrak TLE · ${satRecords.length} objects`;
  buildSatMeshes();
}

function buildDemoSatellites() {
  // Minimal demo: ISS + GPS ring + GEO ring
  const demo = [];
  const mkDemo = (name, altKm, inc, raan) => {
    const n = Math.sqrt(3.986e14 / Math.pow((EARTH_R_KM + altKm) * 1000, 3)) * (86400 / (2 * Math.PI));
    const tle1 = `1 99999U 00000A   ${new Date().toISOString().slice(2,4)}001.00000000  .00000000  00000-0  00000-0 0  9990`;
    const tle2 = `2 99999 ${inc.toFixed(4)} ${raan.toFixed(4)} 0000000   0.0000 000.0000 ${n.toFixed(8)}00000`;
    try { return { name, satrec: satellite.twoline2satrec(tle1, tle2) }; } catch(_) { return null; }
  };
  for (let i = 0; i < 12; i++) demo.push(mkDemo(`GPS-${i+1}`, 20200, 55, i * 30));
  for (let i = 0; i < 8; i++)  demo.push(mkDemo(`GEO-${i+1}`, 35786, 0.1, i * 45));
  for (let i = 0; i < 6; i++)  demo.push(mkDemo(`LEO-${i+1}`, 550, 53, i * 30));
  return demo.filter(Boolean);
}

// ══════════════════════════════════════════════════════════════════════════════
// ASTEROID MODE
// ══════════════════════════════════════════════════════════════════════════════

async function loadAsteroids() {
  // JPL CAD API — no API key, no rate limits, thousands of real asteroids
  const url = 'https://ssd-api.jpl.nasa.gov/cad.api?date-min=2020-01-01&date-max=2024-01-01&dist-max=0.2&fullname=true';

  try {
    const res     = await fetch(url);
    const json    = await res.json();
    const fields  = json.fields;
    const fi      = n => fields.indexOf(n);
    const iDist   = fi('dist'), iVrel = fi('v_rel'), iH = fi('h'), iDes = fi('des'), iDmin = fi('dist_min');

    const rows = json.data.sort(() => Math.random() - 0.5).slice(0, 1500);
    const items = rows.map(r => ({
      name: r[iDes] ?? 'Unknown',
      dist: parseFloat(r[iDist]),
      distMin: parseFloat(r[iDmin] ?? r[iDist]),
      vrel: parseFloat(r[iVrel]),
      h: parseFloat(r[iH]),
    })).filter(a => a.dist > 0 && !isNaN(a.h));

    items.forEach(a => { a.haz = a.distMin < 0.05 && a.h < 22; });

    document.getElementById('data-src').textContent =
      `JPL CAD API · ${items.length} real asteroids`;
    buildAsteroidMeshes(items);
  } catch (e) {
    console.warn('CAD API failed, using demo data:', e.message);
    buildAsteroidMeshes(null);
  }
}

function buildAsteroidMeshes(neos) {
  astGroup.clear();
  astMeshes = [];

  const items = neos
    ? neos  // already parsed by loadAsteroids into { name, dist, vrel, h, haz }
    : Array.from({ length: 1500 }, (_, i) => ({
        name: `Asteroid-${i + 1}`,
        dist: Math.random() * 0.2,
        vrel: 5 + Math.random() * 30,
        h: 15 + Math.random() * 15,
        haz: Math.random() < 0.08,
      }));

  let hazCount = 0, safeCount = 0;

  items.forEach(a => {
    a.haz ? hazCount++ : safeCount++;

    // Scale: 0 AU = 1 (Earth surface), 0.2 AU = 6 units
    const r = 1 + (Math.min(a.dist, 0.2) / 0.2) * 5;
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);

    const x = r * Math.sin(phi) * Math.cos(theta);
    const y = r * Math.sin(phi) * Math.sin(theta) * 0.25;
    const z = r * Math.cos(phi);

    const color = a.haz ? 0xff4444 : a.dist < 0.1 ? 0xffaa00 : 0x44ff88;
    const size  = a.haz ? 0.055 : 0.035;
    const mesh  = mkSphere(size, color, 0.6);
    mesh.position.set(x, y, z);
    mesh.userData = { ...a, orbitAngle: theta, orbitR: r,
                      orbitSpeed: 0.0005 + Math.random() * 0.002 };
    astGroup.add(mesh);
    astMeshes.push(mesh);
  });

  document.getElementById('stat-label').textContent   = 'Asteroids';
  document.getElementById('stat-total').textContent   = astMeshes.length;
  document.getElementById('stat-a-label').textContent = 'Hazardous';
  document.getElementById('stat-b-label').textContent = 'Safe';
  document.getElementById('stat-c-label').textContent = 'Total';
  document.getElementById('stat-leo').textContent     = hazCount;
  document.getElementById('stat-meo').textContent     = safeCount;
  document.getElementById('stat-geo').textContent     = astMeshes.length;

  // Update legend labels for asteroid mode
  updateLegend(false);
}

// ── Legend swap ───────────────────────────────────────────────────────────────
const LEG_SAT = `
  <div class="leg"><div class="dot" style="background:#44ff88"></div> LEO (&lt;2 000 km)</div>
  <div class="leg"><div class="dot" style="background:#ffaa00"></div> MEO (2 000–35 786 km)</div>
  <div class="leg"><div class="dot" style="background:#ff4444"></div> GEO / HEO (&gt;35 786 km)</div>
  <div class="leg"><div class="dot" style="background:#00d4ff"></div> Earth</div>`;
const LEG_AST = `
  <div class="leg"><div class="dot" style="background:#ff4444"></div> Hazardous (NASA PHA)</div>
  <div class="leg"><div class="dot" style="background:#ffaa00"></div> Near (&lt;0.1 AU)</div>
  <div class="leg"><div class="dot" style="background:#44ff88"></div> Safe</div>
  <div class="leg"><div class="dot" style="background:#00d4ff"></div> Earth</div>`;

function updateLegend(satMode) {
  document.getElementById('legend').innerHTML = satMode ? LEG_SAT : LEG_AST;
  const statLeo = document.querySelector('#stats #stat-leo');
  if (!satMode) {
    document.getElementById('stat-label').textContent  = 'Asteroids';
  }
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
let currentMode = 'sat';

window.setMode = function(mode) {
  currentMode = mode;
  document.getElementById('btn-sat').classList.toggle('active', mode === 'sat');
  document.getElementById('btn-ast').classList.toggle('active', mode === 'ast');
  satGroup.visible = mode === 'sat';
  astGroup.visible = mode === 'ast';
  updateLegend(mode === 'sat');

  if (mode === 'sat') updateSatStats();
};

// ── Raycaster ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

renderer.domElement.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const targets = currentMode === 'sat' ? satMeshes : astMeshes;
  const hits = raycaster.intersectObjects(targets);

  if (hits.length) {
    const d = hits[0].object.userData;
    tooltip.style.display = 'block';
    tooltip.style.left    = e.clientX + 14 + 'px';
    tooltip.style.top     = e.clientY + 14 + 'px';

    if (currentMode === 'sat') {
      tooltip.innerHTML = `<strong>${d.name}</strong><br>
        Alt: ${d.altKm?.toFixed(0)} km<br>
        Orbit: ${d.altKm < 2000 ? 'LEO' : d.altKm < 35786 ? 'MEO' : 'GEO/HEO'}`;
    } else {
      tooltip.innerHTML = `<strong>${d.name}</strong><br>
        Dist: ${d.dist?.toFixed(4)} AU<br>
        Vel:  ${d.vrel?.toFixed(2)} km/s<br>
        H:    ${d.h?.toFixed(1)}<br>
        <span style="color:${d.haz ? '#ff4444' : '#44ff88'}">${d.haz ? '⚠ HAZARDOUS' : '✓ SAFE'}</span>`;
    }
  } else {
    tooltip.style.display = 'none';
  }
});

// ── Animation loop ────────────────────────────────────────────────────────────
let frame = 0;

function animate() {
  requestAnimationFrame(animate);
  frame++;

  earth.rotation.y += 0.0005;

  if (currentMode === 'sat' && frame % 30 === 0) {
    updateSatPositions();
  }

  if (currentMode === 'ast') {
    astMeshes.forEach(m => {
      m.userData.orbitAngle += m.userData.orbitSpeed;
      const a = m.userData.orbitAngle, r = m.userData.orbitR;
      m.position.x = r * Math.cos(a);
      m.position.z = r * Math.sin(a);
    });
  }

  controls.update();
  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  satGroup.visible = true;
  astGroup.visible = false;
  await loadSatellites();
  loadAsteroids();   // load in background
  hideLoader();
  animate();
})();
</script>
</body>
</html>
